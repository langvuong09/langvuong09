<svg width="100%" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <image href="https://raw.githubusercontent.com/langvuong09/langvuong09/main/assets/banner.jpg" x="0" y="0" width="1200" height="400"/>

  <!-- Text -->
  <text x="62%" y="55%" text-anchor="middle"
        font-size="60"
        font-family="monospace"
        fill="#00eaff"
        letter-spacing="2">

    <!-- CAO -->
    <tspan opacity="0">C
      <animate attributeName="opacity" to="1" dur="0.25s" begin="0s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">A
      <animate attributeName="opacity" to="1" dur="0.25s" begin="0.25s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">O
      <animate attributeName="opacity" to="1" dur="0.25s" begin="0.5s" fill="freeze"/>
    </tspan>

    <!-- TIẾN -->
    <tspan dx="5" opacity="0">T
      <animate attributeName="opacity" to="1" dur="0.25s" begin="0.75s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">I
      <animate attributeName="opacity" to="1" dur="0.25s" begin="1s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">Ế
      <animate attributeName="opacity" to="1" dur="0.25s" begin="1.25s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">N
      <animate attributeName="opacity" to="1" dur="0.25s" begin="1.5s" fill="freeze"/>
    </tspan>

    <!-- CƯỜNG -->
    <tspan dx="5" opacity="0">C
      <animate attributeName="opacity" to="1" dur="0.25s" begin="1.75s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">Ư
      <animate attributeName="opacity" to="1" dur="0.25s" begin="2s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">Ờ
      <animate attributeName="opacity" to="1" dur="0.25s" begin="2.25s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">N
      <animate attributeName="opacity" to="1" dur="0.25s" begin="2.5s" fill="freeze"/>
    </tspan>
    <tspan opacity="0">G
      <animate attributeName="opacity" to="1" dur="0.25s" begin="2.75s" fill="freeze"/>
    </tspan>

  </text>

</svg>
